name: build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install dependencies
        run: |
            apt update \&&
            apt install cmake

      - name: build
        run: |
             cmake -B build -DCMAKE_BUILD_TYPE=Release . \&&
             cmake --build build --parallel $(nproc) \&&

      - name: upload release
        uses: actions/upload-artifact@v7
        with:
          name: PCL-CGRE
          path: |
            ./build/pcl-cgre
